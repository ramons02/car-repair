spring.application.name=car-repair
server.port=9081
springdoc.api-docs.path=/api-docs


# Dados do banco
spring.datasource.url=jdbc:postgresql://localhost:5432/car_repair_db
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# CRUCIAL: define como o JPA cria/atualiza as tabelas
# 'update': cria se não existir, atualiza se mudar (recomendado para dev)
# 'create': cria do zero a cada execução (apaga dados)
spring.jpa.hibernate.ddl-auto=update

# Opcional: mostra o SQL no console
spring.jpa.show-sql=true

# Horario local
spring.jackson.time-zone=America/Sao_Paulo
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo


#Interface do Swagger
#http://localhost:9081/swagger-ui/index.html