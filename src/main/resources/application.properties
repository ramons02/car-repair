spring.application.name=car-repair
server.port=9081
springdoc.api-docs.path=/api-docs


# Configuracao para o Supabase (Porta 6543 para evitar bloqueio de rede)
spring.datasource.url=jdbc:postgresql://localhost:5432/car_repair_db
spring.datasource.username=postgres
spring.datasource.password=Ra28041996
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# CRUCIAL: define como o JPA cria/atualiza as tabelas
# 'update': cria se não existir, atualiza se mudar (recomendado para dev)
# 'create': cria do zero a cada execução (apaga dados)
spring.jpa.hibernate.ddl-auto=update

# Opcional: mostra o SQL no console
spring.jpa.show-sql=true

# Horario local
spring.jackson.time-zone=America/Sao_Paulo
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo

# Datas como string ISO ao invés de timestamp numérico
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd

# Resolve erro de pattern do Swagger no Spring Boot 3.4+
spring.mvc.pathmatch.matching-strategy=ant_path_matcher


#Pegar o Dados para Swagger
